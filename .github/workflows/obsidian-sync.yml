name: Sync Obsidian Vault

on:
  schedule:
    # Once daily at 12:00 UTC — trigger manually from the Actions tab
    # anytime you need it sooner.
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: node scripts/obsidian-sync.mjs
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SYNC_DM_EMAIL: ${{ secrets.SYNC_DM_EMAIL }}
          SYNC_DM_PASSWORD: ${{ secrets.SYNC_DM_PASSWORD }}
          GDRIVE_SERVICE_ACCOUNT_KEY: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
